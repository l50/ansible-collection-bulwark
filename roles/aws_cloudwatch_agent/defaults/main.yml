---
# General settings
aws_cloudwatch_agent_temp_dir: "/tmp/cloudwatch_install"

# Mode passed to amazon-cloudwatch-agent-ctl -m. Defaults to "ec2" so that,
# on EC2 instances, the agent resolves InstanceId/region from the instance
# metadata service (IMDS) exactly as before. Set to "onPremise" in
# environments without IMDS (e.g. containers or on-prem hosts) so the ctl
# command does not attempt IMDS-based region detection and fail.
aws_cloudwatch_agent_ctl_mode: "ec2"

# AWS region to expose to the agent control script via the AWS_REGION
# environment variable. Leave empty on EC2 so the agent resolves the region
# from IMDS as before. In non-IMDS environments (onPremise mode) the ctl
# command cannot detect a region on its own and fails, so set this to the
# region the agent should report to.
aws_cloudwatch_agent_region: ""

# Linux
aws_cloudwatch_agent_linux_config_dir: "/opt/aws/amazon-cloudwatch-agent/etc"
aws_cloudwatch_agent_linux_log_dir: "/var/log/amazon/amazon-cloudwatch-agent"

# Windows
aws_cloudwatch_agent_windows_temp_dir: "C:\\Windows\\Temp"
aws_cloudwatch_agent_windows_installer: "amazon-cloudwatch-agent.msi"
aws_cloudwatch_agent_windows_config_dir: "C:\\ProgramData\\Amazon\\AmazonCloudWatchAgent"
aws_cloudwatch_agent_windows_log_dir: "C:\\ProgramData\\Amazon\\AmazonCloudWatchAgent\\Logs"

# CloudWatch agent configuration
aws_cloudwatch_agent_config:
  agent:
    metrics_collection_interval: 60
    run_as_user: "root"
  metrics:
    metrics_collected:
      cpu:
        measurement:
          - "cpu_usage_idle"
          - "cpu_usage_iowait"
          - "cpu_usage_user"
          - "cpu_usage_system"
        resources: ["*"]
        totalcpu: true
      disk:
        measurement:
          - "used_percent"
          - "inodes_free"
        resources: ["*"]
      diskio:
        measurement:
          - "io_time"
          - "write_bytes"
          - "read_bytes"
          - "writes"
          - "reads"
        resources: ["*"]
      mem:
        measurement:
          - "mem_used_percent"
      swap:
        measurement:
          - "swap_used_percent"
      netstat:
        measurement:
          - "tcp_established"
          - "tcp_time_wait"
      processes:
        measurement:
          - "running"
          - "blocked"
          - "zombies"

# Dimensions appended to every metric. The default ${aws:...} placeholders are
# resolved from the EC2 instance metadata service (IMDS), which requires the
# ec2tagger processor and therefore a real EC2 instance. Set this to an empty
# map ({}) in non-IMDS environments (containers, on-prem) so the agent does not
# load the ec2tagger processor and crash on startup.
aws_cloudwatch_agent_append_dimensions:
  InstanceId: "${aws:InstanceId}"
  InstanceType: "${aws:InstanceType}"
  AutoScalingGroupName: "${aws:AutoScalingGroupName}"
